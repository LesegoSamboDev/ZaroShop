<div class="container mt-4">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2>Product Catalog</h2>
    <button class="btn btn-primary" routerLink="/products/add">
      <i class="bi bi-plus-circle me-2"></i>Add New Product
    </button>
  </div>

  <div class="card bg-light mb-4 border-0 shadow-sm">
    <div class="card-body">
      <div class="row g-3">
        <div class="col-md-4">
          <label class="small fw-bold text-secondary">Search</label>
          <app-search-bar (searchChange)="onSearch($event)"></app-search-bar>
        </div>

        <div class="col-md-3">
          <label class="small fw-bold text-secondary">Industry (Category)</label>
          <select class="form-select" (change)="updateCategory($any($event.target).value)">
            <option value="">All Categories</option>
            <option *ngFor="let cat of categories" [value]="cat.id">
              {{ cat.name }}
            </option>
          </select>
        </div>

        <div class="col-md-3">
          <label class="small fw-bold text-secondary">Price Range</label>
          <div class="input-group">
            <input type="number" class="form-control form-control-sm" placeholder="Min"
                   (change)="currentFilters.minPrice = +$any($event.target).value; applyFilters()">
            <input type="number" class="form-control form-control-sm" placeholder="Max"
                   (change)="currentFilters.maxPrice = +$any($event.target).value; applyFilters()">
          </div>
        </div>

        <div class="col-md-2 d-flex align-items-end">
          <div class="form-check form-switch mb-2">
            <input class="form-check-input" type="checkbox" id="stockSwitch"
                   (change)="updateStockFilter($any($event.target).checked)">
            <label class="form-check-label small fw-bold" for="stockSwitch">In Stock Only</label>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div [hidden]="!loading" class="text-center my-5">
    <div class="spinner-border text-primary"></div>
    <p>Loading...</p>
  </div>

  <div class="card shadow-sm border-0" *ngIf="!loading">
    <div class="table-responsive">
      <table class="table table-hover align-middle mb-0">
        <thead class="table-light">
          <tr>
            <th class="ps-4">Product Details</th>
            <th>SKU</th>
            <th>Category</th>
            <th class="text-end">Price</th>
            <th class="text-center">Stock</th>
            <th class="text-center pe-4">Actions</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let product of products">
            <td class="ps-4">
              <div class="fw-bold">{{ product.name }}</div>
              <small class="text-muted">ID: #{{ product.id }}</small>
            </td>
            <td><code>{{ product.sku }}</code></td>
            <td>
              <span class="badge rounded-pill bg-info-subtle text-info-emphasis border border-info-subtle">
                {{ product.categoryName }}
              </span>
            </td>
            <td class="text-end fw-bold">{{ product.price | currency:'ZAR':'symbol-narrow' }}</td>
            <td class="text-center">
              <span [class]="product.quantity > 5 ? 'badge bg-success-subtle text-success' : 'badge bg-danger-subtle text-danger'">
                {{ product.quantity }}
              </span>
            </td>
            <td class="text-center pe-4">
              <div class="btn-group btn-group-sm">
                <button class="btn btn-outline-primary" [routerLink]="['/products/edit', product.id]"><i class="bi bi-pencil"></i></button>
                <button class="btn btn-outline-danger" (click)="onDelete(product.id)"><i class="bi bi-trash"></i></button>
              </div>
            </td>
          </tr>

          <tr *ngIf="products.length === 0">
            <td colspan="6" class="text-center py-5">
              <p class="text-muted mb-0">No products match these filters.</p>
              <button class="btn btn-sm btn-link" (click)="loadAllProducts()">Reset View</button>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
