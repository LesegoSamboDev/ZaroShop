<div class="container mt-4">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2>Product Catalog</h2>
    <button class="btn btn-primary" routerLink="/products/add">
      <i class="bi bi-plus-circle me-2"></i>Add New Product
    </button>
  </div>

  <div class="row g-3 mb-4">
    <div class="col-md-7">
      <app-search-bar (searchChange)="onSearch($event)"></app-search-bar>
    </div>

    <div class="col-md-5">
      <div class="input-group">
        <label class="input-group-text" for="categoryFilter"><i class="bi bi-filter"></i></label>
        <select id="categoryFilter" class="form-select" (change)="filterByCategory(+$any($event.target).value)">
          <option value="">All Categoriess</option>
          <option value="1">Electronics</option>
          <option value="2">Home & Living</option>
        </select>
      </div>
    </div>
  </div>

  <div *ngIf="loading" class="text-center my-5">
    <div class="spinner-border text-primary" role="status" style="width: 3rem; height: 3rem;">
      <span class="visually-hidden">Loading...</span>
    </div>
    <p class="mt-2 text-muted">Consulting the fuzzy search engines...</p>
  </div>

  <div class="card shadow-sm" *ngIf="!loading">
    <div class="table-responsive">
      <table class="table table-hover align-middle mb-0">
        <thead class="table-light">
          <tr>
            <th style="width: 30%">Product Name</th>
            <th>SKU</th>
            <th>Category</th>
            <th class="text-end">Price</th>
            <th class="text-center">Stock</th>
            <th class="text-center">Actions</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let product of products">
            <td>
              <div class="fw-bold">{{ product.name }}</div>
              <small class="text-muted">ID: #{{ product.id }}</small>
            </td>
            <td>
              <code class="text-primary fw-bold">{{ product.sku }}</code>
            </td>
            <td>
              <span class="badge rounded-pill bg-info text-dark">
                {{ product.categoryName }}
              </span>
            </td>
            <td class="text-end fw-bold">
              {{ product.price | currency }}
            </td>
            <td class="text-center">
              <span [class]="product.quantity > 5 ? 'text-success' : 'text-danger'">
                {{ product.quantity }}
              </span>
            </td>
            <td class="text-center">
              <div class="btn-group btn-group-sm">
                <button class="btn btn-outline-primary"
                        [routerLink]="['/products/edit', product.id]"
                        title="Edit Product">
                  <i class="bi bi-pencil"></i>
                </button>
                <button class="btn btn-outline-danger"
                        (click)="onDelete(product.id)"
                        title="Delete Product">
                  <i class="bi bi-trash"></i>
                </button>
              </div>
            </td>
          </tr>

          <tr *ngIf="products.length === 0">
            <td colspan="6" class="text-center py-5">
              <i class="bi bi-search display-4 text-muted d-block mb-3"></i>
              <p class="h5 text-muted">No products found.</p>
              <button class="btn btn-sm btn-link" (click)="loadAllProducts()">Clear all filters</button>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
