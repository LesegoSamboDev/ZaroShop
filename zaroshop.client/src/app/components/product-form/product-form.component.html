<div class="container mt-4">
  <div class="card shadow-sm">
    <div class="card-header bg-primary text-white">
      <h3 class="mb-0">{{ isEditMode ? 'Edit Product' : 'Add New Product' }}</h3>
    </div>
    <div class="card-body">
      <form [formGroup] post="productForm" (ngSubmit)="onSubmit()">

        <div class="mb-3">
          <label class="form-label">Product Name</label>
          <input type="text" class="form-control" formControlName="name"
                 [class.is-invalid]="productForm.get('name')?.invalid && productForm.get('name')?.touched">
          <div class="invalid-feedback">Name is required (min 3 characters).</div>
        </div>

        <div class="row">
          <div class="col-md-6 mb-3">
            <label class="form-label">SKU</label>
            <input type="text" class="form-control" formControlName="sku">
          </div>

          <div class="col-md-6 mb-3">
            <label class="form-label">Category</label>
            <select class="form-select" formControlName="categoryId">
              <option value="">Select Category</option>
              <option *ngFor="let cat of categories" [value]="cat.id">{{ cat.name }}</option>
            </select>
          </div>
        </div>

        <div class="row">
          <div class="col-md-6 mb-3">
            <label class="form-label">Price</label>
            <div class="input-group">
              <span class="input-group-text">$</span>
              <input type="number" class="form-control" formControlName="price">
            </div>
          </div>

          <div class="col-md-6 mb-3">
            <label class="form-label">Stock Quantity</label>
            <input type="number" class="form-control" formControlName="quantity">
          </div>
        </div>

        <div class="mt-4 d-flex gap-2">
          <button type="submit" class="btn btn-success" [disabled]="productForm.invalid">
            {{ isEditMode ? 'Update Product' : 'Save Product' }}
          </button>
          <button type="button" class="btn btn-outline-secondary" routerLink="/products">
            Cancel
          </button>
        </div>

      </form>
    </div>
  </div>
</div>
